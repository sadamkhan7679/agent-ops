name: Bug report
description: Report a bug in the app, content rendering, or developer workflow
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please provide enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps, file paths, or URLs when relevant.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, browser, or tool details.
      placeholder: Windows 11, Node 22, pnpm 10, Chrome 135
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or related content slugs.
